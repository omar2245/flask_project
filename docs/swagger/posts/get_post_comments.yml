tags:
  - Posts
summary: 取得貼文留言
parameters:
  - in: path
    name: post_id
    type: integer
    required: true
    description: 貼文 ID
  - in: query
    name: page
    type: integer
    default: 1
    required: false
  - in: query
    name: limit
    type: integer
    default: 10
    required: false
responses:
  200:
    description: 成功取得留言列表
  400:
    description: 參數錯誤或貼文不存在
