tags:
  - Posts
summary: 取得貼文列表
parameters:
  - in: query
    name: page
    type: integer
    default: 1
    required: false
    description: 頁碼
  - in: query
    name: limit
    type: integer
    default: 10
    required: false
    description: 每頁筆數
responses:
  200:
    description: 成功取得貼文列表
  400:
    description: page 或 limit 格式錯誤
