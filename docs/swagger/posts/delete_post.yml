tags:
  - Posts
summary: 刪除自己的貼文
security:
  - Bearer: []
parameters:
  - in: path
    name: post_id
    type: integer
    required: true
    description: 貼文 ID
responses:
  200:
    description: 刪除成功
  401:
    description: 未登入或 token 無效
  403:
    description: 沒有權限刪除此貼文
  404:
    description: 貼文不存在
