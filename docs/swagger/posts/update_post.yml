tags:
  - Posts
summary: 更新自己的貼文
security:
  - Bearer: []
parameters:
  - in: path
    name: post_id
    type: integer
    required: true
    description: 貼文 ID
  - in: body
    name: body
    required: true
    schema:
      type: object
      required: [content]
      properties:
        content:
          type: string
          example: 更新後的貼文內容
responses:
  200:
    description: 更新成功
  400:
    description: content 不可為空
  401:
    description: 未登入或 token 無效
  403:
    description: 沒有權限更新此貼文
  404:
    description: 貼文不存在
