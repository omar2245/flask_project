tags:
  - Users
summary: 取得指定使用者的貼文
parameters:
  - in: path
    name: user_id
    type: integer
    required: true
    description: 使用者 ID
  - in: query
    name: page
    type: integer
    default: 1
    required: false
  - in: query
    name: limit
    type: integer
    default: 10
    required: false
responses:
  200:
    description: 成功取得使用者貼文列表
  400:
    description: page 或 limit 格式錯誤
  404:
    description: 使用者不存在
